name: CI Pipeline

# ---------------------------------------------------------------------------
# Triggers:
#   - push/PR on main: fast gate (lint, unit, api, smoke)
#   - nightly schedule: adds the slower regression suite
#   - workflow_dispatch: manual trigger, e.g. to run regression on demand
# ---------------------------------------------------------------------------
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * *" # Nightly regression run at 02:00 UTC
  workflow_dispatch:

# Cancels a stale in-progress run when new commits are pushed to the same
# branch/PR, so CI minutes aren't wasted testing outdated code.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 20
  PYTHON_VERSION: "3.11"

jobs:
  # =============================================================================
  # Lint — fastest possible signal, runs first and gates every other job
  # =============================================================================
  lint:
    name: Lint (ESLint + Flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npm run lint

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: pip install flake8
      - run: flake8 ai-agent --max-line-length=110 --exclude=ai-agent/tests

  # =============================================================================
  # Unit tests — pure Python, no browser/Docker needed, so it stays cheap and fast
  # =============================================================================
  unit-tests:
    name: Unit Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - run: pip install -r ai-agent/requirements.txt -r ai-agent/requirements-dev.txt
      - run: pytest ai-agent/tests -v

  # =============================================================================
  # API tests — contract-level checks, no UI, run in parallel with unit-tests
  # =============================================================================
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Start app + Redis
        run: docker compose up -d --build app redis

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npx wait-on http://localhost:3001/login --timeout 120000

      - run: npm run cypress:run:api
        env:
          CYPRESS_apiUrl: http://localhost:3001

      - name: Tear down
        if: always()
        run: docker compose down -v

  # =============================================================================
  # Smoke tests — the fast, critical-path gate; blocks merge on failure
  # =============================================================================
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [unit-tests, api-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Start app + Redis
        run: docker compose up -d --build app redis

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npx wait-on http://localhost:3000 --timeout 120000

      - run: npm run cypress:run:smoke
        env:
          CYPRESS_baseUrl: http://localhost:3000
          CYPRESS_apiUrl: http://localhost:3001

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-smoke-artifacts
          path: |
            cypress/videos
            cypress/screenshots
          retention-days: 7

      - name: Tear down
        if: always()
        run: docker compose down -v

  # =============================================================================
  # Regression tests — broader coverage, only on schedule or manual trigger,
  # so PRs stay fast while release-quality checks still happen nightly.
  # =============================================================================
  regression-tests:
    name: Regression Tests
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: smoke-tests
    steps:
      - uses: actions/checkout@v4

      - name: Start app + Redis
        run: docker compose up -d --build app redis

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npx wait-on http://localhost:3000 --timeout 120000

      - run: npm run cypress:run:regression
        env:
          CYPRESS_baseUrl: http://localhost:3000
          CYPRESS_apiUrl: http://localhost:3001

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-regression-artifacts
          path: |
            cypress/videos
            cypress/screenshots
          retention-days: 7

      - name: Tear down
        if: always()
        run: docker compose down -v

  # =============================================================================
  # AI-driven tests — cy.prompt demo specs, gated behind an optional secret
  # so forks/contributors without a Cypress AI key still get a green pipeline.
  # =============================================================================
  ai-driven-tests:
    name: AI-Driven Tests (cy.prompt)
    if: ${{ secrets.CYPRESS_AI_KEY != '' }}
    runs-on: ubuntu-latest
    needs: smoke-tests
    steps:
      - uses: actions/checkout@v4

      - name: Start app + Redis
        run: docker compose up -d --build app redis

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npx wait-on http://localhost:3000 --timeout 120000

      - run: npm run cypress:run:ai
        env:
          CYPRESS_baseUrl: http://localhost:3000
          CYPRESS_apiUrl: http://localhost:3001
          CYPRESS_AI_KEY: ${{ secrets.CYPRESS_AI_KEY }}

      - name: Tear down
        if: always()
        run: docker compose down -v

  # =============================================================================
  # Docker build validation — confirms every image in the stack still builds,
  # using GitHub Actions' own layer cache to keep this fast on unchanged layers.
  # =============================================================================
  docker-build:
    name: Build & Validate Docker Images
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Cypress runner image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          cache-from: type=gha,scope=cypress
          cache-to: type=gha,mode=max,scope=cypress

      - name: Build AI agent image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./ai-agent/Dockerfile
          push: false
          cache-from: type=gha,scope=ai-agent
          cache-to: type=gha,mode=max,scope=ai-agent

      - name: Build app-under-test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/app-under-test.Dockerfile
          push: false
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app
